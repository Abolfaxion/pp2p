name: SOCKS5 Proxy

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'مدت زمان اجرا (دقیقه)'
        required: false
        default: '60'

jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - name: نصب GOST و Cloudflared
        run: |
          sudo apt update
          sudo apt install -y wget curl
          
          # نصب GOST
          cd /tmp
          wget https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          sudo mv gost-linux-amd64-2.11.5 /usr/local/bin/gost
          
          # نصب Cloudflared
          wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
      
      - name: اجرای پروکسی و تونل
        run: |
          # اجرای GOST در پس‌زمینه
          gost -L=socks5://:1080 &
          sleep 3
          
          # ایجاد تونل Cloudflared
          echo "=== آدرس پروکسی شما ==="
          cloudflared tunnel --url localhost:1080 --protocol http

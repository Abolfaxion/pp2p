name: SOCKS5 Proxy

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'مدت زمان اجرا (دقیقه)'
        required: false
        default: '60'

jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - name: نصب GOST
        run: |
          sudo apt update
          sudo apt install -y wget
          cd /tmp
          wget https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          sudo mv gost-linux-amd64-2.11.5 /usr/local/bin/gost
          gost -V
      
      - name: اجرای پروکسی SOCKS5
        run: |
          gost -L=socks5://:1080 &
          echo "پروکسی روی پورت 1080 در حال اجراست"
          echo "برای مشاهده آدرس، به تب Ports مراجعه کنید"
          sleep ${{ github.event.inputs.duration }}m
